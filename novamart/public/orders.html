<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaMart | Your Orders</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/animations.css">
    <link rel="stylesheet" href="/css/responsive.css">
    <script src="https://unpkg.com/feather-icons"></script>
    <style>
        body { background: #f1f3f6; }
        
        .orders-page {
            padding: 30px 0;
            max-width: 1000px;
        }

        .page-header {
            background: #fff;
            padding: 20px 30px;
            border-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex; justify-content: space-between; align-items:center;
        }
        .page-header h1 { font-size: 1.5rem; font-weight: 500; }

        .order-card {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            margin-bottom: 25px;
            overflow: hidden;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        
        .order-header {
            background: #f0f2f2;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #d5d9d9;
            font-size: 0.9rem;
        }
        
        .order-meta-col { display: flex; flex-direction: column; }
        .order-meta-label { color: #565959; text-transform: uppercase; font-size: 0.8rem; margin-bottom: 2px;}
        .order-meta-val { color: #0f1111; font-weight: 500; }
        .order-id { color: #007185; }

        .order-body { padding: 20px 25px; }
        .order-status {
            font-size: 1.1rem;
            font-weight: bold;
            color: #007600;
            margin-bottom: 15px;
            display:flex; align-items:center; gap:8px;
        }
        .order-status i { width: 18px; }

        .order-item {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #f0f0f0;
        }
        .order-item:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
        
        .order-item img {
            width: 80px; height: 80px; object-fit: contain;
        }
        
        .order-item-info { flex: 1; }
        .order-item-title { font-weight: 500; color: #007185; font-size: 1rem; margin-bottom: 5px; }
        .order-item-actions button {
            background: #fff; border: 1px solid #d5d9d9; border-radius: 8px; padding: 5px 15px; box-shadow: 0 2px 5px rgba(15,17,17,.15); cursor:pointer; font-size: 0.85rem; margin-top:10px;
        }
        .order-item-actions button:hover { background: #f7fafa; }

        .points-earn { color: #ff9f00; font-size:0.9rem; margin-top:10px; font-weight:500;}

        @media (max-width: 600px) {
            .order-header { flex-direction: column; align-items: flex-start; gap: 10px; }
        }
    </style>
</head>
<body>

    <nav class="navbar" id="navbar">
        <div class="container nav-container">
            <a href="/" class="logo">
                <img src="/images/logo.png" alt="NovaMart" style="height: 40px; vertical-align: middle; margin-right: 10px;">
                <span>NovaMart</span>
            </a>
            <div class="nav-actions">
                <button class="nav-link-btn" id="authUserBtn" onclick="window.location.href='/auth.html'">Login</button>
                <button class="nav-link-btn" onclick="window.location.href='/cart.html'" style="position: relative;">
                    <i data-feather="shopping-cart"></i> Cart
                    <span class="badge" id="cartCount">0</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="container orders-page">
        
        <div class="page-header fade-up">
            <h1>Your Orders</h1>
            <div class="nav-search" style="margin:0; width:300px;">
                <input type="text" placeholder="Search orders">
                <button><i data-feather="search" style="width: 16px;"></i></button>
            </div>
        </div>
        
        <div id="loadingIndicator" style="text-align: center; padding: 50px;">
            <div class="loader-spinner" style="margin: 0 auto;"></div>
        </div>

        <div id="ordersContainer" style="display: none;"></div>
        
    </main>

    <footer style="margin-top:40px;">
        <div class="container text-center">
            <p>&copy; 2024 NovaMart.</p>
        </div>
    </footer>

    <script src="/js/toast.js"></script>
    <script src="/js/animations.js"></script>
    <script src="/js/app.js"></script>
    <script>
        feather.replace();

        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(async () => {
                const container = document.getElementById('ordersContainer');
                const loader = document.getElementById('loadingIndicator');

                if (!App.user) {
                    window.location.href = '/auth.html';
                    return;
                }

                try {
                    const res = await fetch('/api/orders', { headers: { 'Authorization': `Bearer ${App.token}` } });
                    const data = await res.json();
                    
                    loader.style.display = 'none';
                    container.style.display = 'block';

                    if (!data.orders || data.orders.length === 0) {
                        container.innerHTML = '<div style="background:#fff; padding:40px; text-align:center; border-radius:4px;"><p>No orders found.</p></div>';
                        return;
                    }

                    let html = '';
                    data.orders.forEach((o, i) => {
                        const d = new Date(o.created_at).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
                        
                        let itemsHtml = '';
                        o.items.forEach(item => {
                            itemsHtml += `
                                <div class="order-item">
                                    <img src="${item.image_url}">
                                    <div class="order-item-info">
                                        <div class="order-item-title">${item.name}</div>
                                        <div style="font-size: 0.9rem; color:#565959;">Return window closed</div>
                                        <div class="order-item-actions">
                                            <button onclick="window.location.href='/product.html?id=${item.product_id}'">Buy it again</button>
                                        </div>
                                    </div>
                                    <div style="font-weight:bold;">$${item.price}</div>
                                </div>
                            `;
                        });

                        html += `
                            <div class="order-card fade-up visible" style="animation-delay: ${i*0.1}s">
                                <div class="order-header">
                                    <div style="display:flex; gap:30px;">
                                        <div class="order-meta-col">
                                            <span class="order-meta-label">Order Placed</span>
                                            <span class="order-meta-val">${d}</span>
                                        </div>
                                        <div class="order-meta-col">
                                            <span class="order-meta-label">Total</span>
                                            <span class="order-meta-val">$${Number(o.total_price).toLocaleString()}</span>
                                        </div>
                                        <div class="order-meta-col">
                                            <span class="order-meta-label">Ship To</span>
                                            <span class="order-meta-val" style="color:#007185; cursor:pointer;">${App.user.name}</span>
                                        </div>
                                    </div>
                                    <div class="order-meta-col" style="text-align:right;">
                                        <span class="order-meta-label">Order # ${o.id.toString().padStart(6, '0')}</span>
                                        <span class="order-meta-val order-id">View order details</span>
                                    </div>
                                </div>
                                <div class="order-body">
                                    <div class="order-status"><i data-feather="check-circle"></i> Delivered</div>
                                    <div>${itemsHtml}</div>
                                    <div class="points-earn">Reward points earned: ${o.points_earned}</div>
                                </div>
                            </div>
                        `;
                    });

                    container.innerHTML = html;
                    if(window.feather) feather.replace();

                } catch (e) {
                    console.error(e);
                    window.showToast('Failed to fetch orders', 'error');
                }
            }, 600); // Wait for auth
        });
    </script>
</body>
</html>
