<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaMart | Products</title>
    <!-- Styles -->
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/animations.css">
    <link rel="stylesheet" href="/css/responsive.css">
    <!-- Features -->
    <link rel="stylesheet" href="/features/assistant.css">
    <link rel="stylesheet" href="/features/visual-search.css">
    <link rel="stylesheet" href="/features/assistant.css">
    <script src="https://unpkg.com/feather-icons"></script>
    <style>
        .store-layout {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 20px;
            padding: 20px 0;
            align-items: start;
        }

        /* Sidebar Filters */
        .filter-sidebar {
            background: var(--bg-surface);
            border-radius: 4px;
            box-shadow: var(--shadow-card);
            padding: 20px;
            position: sticky;
            top: 120px;
        }

        .filter-section {
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #f0f0f0;
        }
        .filter-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

        .filter-section h3 {
            font-size: 1.1rem;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .cat-btn {
            display: block;
            width: 100%;
            text-align: left;
            background: none;
            border: none;
            padding: 8px 0;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.95rem;
            transition: color var(--transition-fast);
        }
        .cat-btn:hover { color: var(--primary-color); }
        .cat-btn.active { font-weight: bold; color: var(--primary-color); }

        .search-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: var(--bg-surface);
            padding: 15px;
            box-shadow: var(--shadow-card);
            border-radius: 4px;
            align-items: center;
            justify-content: space-between;
        }

        /* Product Grid */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .product-card {
            background: var(--bg-surface);
            border-radius: 4px;
            padding: 15px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            border: 1px solid transparent;
            position: relative;
        }

        .product-card:hover {
            box-shadow: var(--shadow-hover);
        }

        .pd-img-container {
            width: 100%;
            height: 180px;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .pd-img-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: transform 0.3s ease;
        }
        .product-card:hover .pd-img-container img { transform: scale(1.05); }

        .pd-title {
            font-size: 0.95rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-primary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .pd-rating {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.8rem;
            color: #878787;
            margin-bottom: 8px;
        }

        .pd-rating span {
            background: #388e3c;
            color: white;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: 500;
        }

        .pd-price {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 12px;
            margin-top: auto;
        }

        .pd-add-btn {
            width: 100%;
            padding: 10px;
            background: var(--action-orange);
            color: white;
            border: none;
            border-radius: 2px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            display: none; /* Show only on hover in desktop for clean look, or keep sticky for ecommerce */
        }
        
        .product-card:hover .pd-add-btn {
            display: block;
        }
        .pd-add-btn:hover { background: #e08b00; }

        @media (max-width: 1200px) { .product-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 900px) {
            .store-layout { grid-template-columns: 1fr; }
            .filter-sidebar { display: none; /* would need a mobile toggle */ }
            .product-grid { grid-template-columns: repeat(2, 1fr); }
            .pd-add-btn { display: block; }
        }
        @media (max-width: 500px) { .product-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <nav class="navbar" id="navbar">
        <div class="container nav-container">
            <!-- Logo -->
            <a href="/" class="logo">
                <img src="/images/logo.png" alt="NovaMart" style="height: 40px; vertical-align: middle; margin-right: 10px;">
                <span>NovaMart</span>
            </a>
            
            <button class="menu-toggle" id="menuToggle"><i data-feather="menu"></i></button>

            <div class="nav-search">
                <input type="text" id="globalSearchInput" placeholder="Search for products, brands and more">
                <button onclick="executeSearch()"><i data-feather="search" style="width: 18px;"></i></button>
            </div>

            <div class="nav-actions">
                <button class="nav-link-btn" id="authUserBtn" onclick="window.location.href='/auth.html'">Login</button>
                <div id="userPoints" style="display: none; color: #ff9f00; font-weight: 500; font-size:0.9rem;">
                    Points: <span id="pointsValue">0</span>
                </div>
                <button class="nav-link-btn" onclick="window.location.href='/orders.html'" style="display:hidden;" id="ordersBtn">Orders</button>
                <button class="nav-link-btn" onclick="window.location.href='/cart.html'" style="position: relative;">
                    <i data-feather="shopping-cart"></i> Cart
                    <span class="badge" id="cartCount">0</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Secondary Navbar -->
    <div class="secondary-nav">
        <div class="container">
            <ul class="nav-links">
                <li><a href="/products.html?category=electronics">Electronics</a></li>
                <li><a href="/products.html?category=fashion">Fashion</a></li>
                <li><a href="/products.html?category=home">Home & Furniture</a></li>
                <li><a href="/products.html?category=appliances">Appliances</a></li>
                <li><a href="/products.html">All Products</a></li>
            </ul>
        </div>
    </div>


    <main class="container store-layout" style="margin-top: 40px;">
        
        <!-- Sidebar Filters -->
        <aside class="filter-sidebar reveal fade-right">
            <div class="filter-section">
                <h3>Filters</h3>
                <div style="margin-bottom: 10px; font-size:0.9rem; color: #878787;">CATEGORIES</div>
                <button class="cat-btn active" data-cat="all">All Items</button>
                <button class="cat-btn" data-cat="electronics">Electronics & Mobiles</button>
                <button class="cat-btn" data-cat="fashion">Fashion</button>
                <button class="cat-btn" data-cat="home">Home & Furniture</button>
                <button class="cat-btn" data-cat="appliances">Appliances</button>
            </div>

            <div class="filter-section">
                <h3>Customer Ratings</h3>
                <div style="display:flex; flex-direction:column; gap:8px;">
                    <label style="cursor:pointer;"><input type="checkbox"> 4★ & above</label>
                    <label style="cursor:pointer;"><input type="checkbox"> 3★ & above</label>
                </div>
            </div>
            
            <div class="filter-section">
                <h3>Price</h3>
                <input type="range" style="width:100%" min="0" max="2000">
                <div style="display:flex; justify-content:space-between; margin-top:5px; font-size:0.8rem; color:#878787;">
                    <span>$0</span><span>$2000+</span>
                </div>
            </div>
        </aside>

        <!-- Product Listing Area -->
        <section>
            <div class="search-controls">
                <div>
                    <h2 style="font-size: 1.2rem; font-weight: 500;">Showing Products</h2>
                    <span style="font-size: 0.9rem; color: #878787;" id="resultCount">(...)</span>
                </div>
                <div>
                    <select id="sortSelect" style="padding: 8px; border: 1px solid var(--border-light); border-radius:3px; outline:none; font-family:var(--font-main);">
                        <option value="pop">Sort by: Popularity</option>
                        <option value="low">Sort by: Price -- Low to High</option>
                        <option value="high">Sort by: Price -- High to Low</option>
                    </select>
                </div>
            </div>

            <!-- Preloader Grid -->
            <div class="product-grid" id="loadingGrid">
                <div class="skeleton" style="height: 350px;"></div>
                <div class="skeleton" style="height: 350px;"></div>
                <div class="skeleton" style="height: 350px;"></div>
                <div class="skeleton" style="height: 350px;"></div>
                <div class="skeleton" style="height: 350px;"></div>
                <div class="skeleton" style="height: 350px;"></div>
                <div class="skeleton" style="height: 350px;"></div>
                <div class="skeleton" style="height: 350px;"></div>
            </div>

            <div class="product-grid stagger-container" id="productGrid" style="display: none;">
                <!-- Dynamically injected via JS -->
            </div>
        </section>

    </main>

    <footer>
        <div class="container text-center">
            <p>&copy; 2024 NovaMart. The Professional E-Commerce Destination.</p>
        </div>
    </footer>

    <script src="/js/toast.js"></script>
    <script src="/js/animations.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/chatbot.js"></script>
    <script src="/features/assistant.js"></script>
    <script src="/features/visual-search.js"></script>
    <script src="/features/gamification.js"></script>
    <script src="/features/suggestions.js"></script>
    <script src="/features/assistant.js"></script>
    <script>feather.replace();</script>
    <script src="/js/products.js"></script>
    <script>
        // Update styling of existing JS logic for addToCart click event from products.js
        function executeSearch() {
            const val = document.getElementById('globalSearchInput').value;
            if(val) window.location.href = `/products.html?search=${encodeURIComponent(val)}`;
        }
        document.getElementById('globalSearchInput').addEventListener('keypress', function(e) {
            if(e.key === 'Enter') executeSearch();
        });
    </script>
</body>
</html>
